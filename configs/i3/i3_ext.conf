# Partial i3 config
# A personal extension to the i3 defaults
#

# additional key space to avoid finger acrobatics
set $alt Mod1

set $exec exec --no-startup-id


###############################################################################
#### Key Bindings #############################################################
###############################################################################

#----------------------------------------------- Keyboard Language Layout ----#
bindsym $super+space $exec ~/bin/keyboard_lang.sh

#--------------------------------------------------------- Volume Control ----#
set $exec_wpctl exec --no-startup-id wpctl
set $sink_id @DEFAULT_AUDIO_SINK@

bindsym XF86AudioRaiseVolume $exec_wpctl set-volume $sink_id 5%+
bindsym XF86AudioLowerVolume $exec_wpctl set-volume $sink_id 5%-
bindsym XF86AudioMute        $exec_wpctl set-mute   $sink_id toggle

#------------------------------------------------------------- Screenshot ----#
bindsym Print $exec ~/bin/screenshot.sh

#------------------------------------------------------------- Scratchpad ----#
set $exec_scratcher exec --no-startup-id ~/bin/i3/scratchpad_manager.sh

set $sp0 0
set $sp1 1
set $sp2 2
set $sp3 3
set $sp4 4
set $sp5 5
set $sp6 6
set $sp7 7
set $sp8 8
set $sp9 9

mode "marker_toggle" {
  bindsym $sp0 $exec_scratcher marker=$sp0
  bindsym $sp1 $exec_scratcher marker=$sp1
  bindsym $sp2 $exec_scratcher marker=$sp2
  bindsym $sp3 $exec_scratcher marker=$sp3
  bindsym $sp4 $exec_scratcher marker=$sp4
  bindsym $sp5 $exec_scratcher marker=$sp5
  bindsym $sp6 $exec_scratcher marker=$sp6
  bindsym $sp7 $exec_scratcher marker=$sp7
  bindsym $sp8 $exec_scratcher marker=$sp8
  bindsym $sp9 $exec_scratcher marker=$sp9

  bindsym $super+Left   move left   5 ppt
  bindsym $super+Down   move down   5 ppt
  bindsym $super+Up     move up     5 ppt
  bindsym $super+Right  move right  5 ppt

  bindsym m move position mouse

  bindsym Return mode "default"
  bindsym Escape mode "default"
  bindsym $alt+m mode "default"

}
bindsym $alt+m mode "marker_toggle"

## toggle scratchpad visibility by id
bindsym $alt+$sp0 $exec_scratcher visibility=$sp0
bindsym $alt+$sp1 $exec_scratcher visibility=$sp1
bindsym $alt+$sp2 $exec_scratcher visibility=$sp2
bindsym $alt+$sp3 $exec_scratcher visibility=$sp3
bindsym $alt+$sp4 $exec_scratcher visibility=$sp4
bindsym $alt+$sp5 $exec_scratcher visibility=$sp5
bindsym $alt+$sp6 $exec_scratcher visibility=$sp6
bindsym $alt+$sp7 $exec_scratcher visibility=$sp7
bindsym $alt+$sp8 $exec_scratcher visibility=$sp8
bindsym $alt+$sp9 $exec_scratcher visibility=$sp9

#---------------------------------------------------------- Float Control ----#
bindsym $alt+space focus mode_toggle
floating_modifier $alt

#--------------------------------------------------------------- Browsers ----#
## chromium
set $exec_chromium exec chromium

bindsym $alt+F1 $exec_chromium
bindsym $alt+Shift+F1 $exec_chromium --incognito

## firefox
set $exec_ffesr exec firefox-esr
set $exec_ffde exec firefox-devedition
set $ff_pure --private-window

bindsym $alt+F2 $exec_ffesr
bindsym $alt+Shift+F2 $exec_ffesr $ff_pure

bindsym $alt+F3 $exec_ffde
bindsym $alt+Shift+F3 $exec_ffde $ff_pure



###############################################################################
#### Visual & Functional Tweaks ###############################################
###############################################################################

#------------------------------------------------- Window Container Style ----#
default_border normal 1
hide_edge_borders smart_no_gaps
title_align center

#---------------------------------------------------------------- Display ----#
exec_always --no-startup-id ~/bin/uw-setup.sh

#---------------------------------------------------------- Focus Control ----#
focus_follows_mouse no

#------------------------------------------------------------- Status Bar ----#
exec_always --no-startup-id ~/bin/dzen2runner restart

#------------------------------------------------------------------ Theme ----#
include ~/.config/i3/groove.conf

#------------------------------------------------------------------- Font ----#
font pango:TX-02 Thin 11



###############################################################################
#### Environment ##############################################################
###############################################################################

#----------------------------------------------------------------- Portal ----#
exec --no-startup-id /usr/libexec/xdg-desktop-portal
exec --no-startup-id /usr/libexec/xdg-desktop-portal-gtk
